    # Documentation: https://rmk.rs/docs/configuration.html
    [keyboard]
    name = "Quad40"
    product_name = "Quad40"
    vendor_id = 0x4c4b
    product_id = 0xbf30
    manufacturer = "April"
    chip = "nrf52840"

    [matrix]
    # Row and col pins are mandatory
    row_pins = ["P0_06", "P0_20", "P0_17", "P0_08"]
    col_pins = ["P0_22", "P0_24", "P1_00", "P0_11", "P1_04", "P1_06", "P0_09", "P0_10", "P1_11", "P1_13"]

    # RMK uses col2row as the default matrix diode direction, if you want to use a row2col matrix, add `row2col = true`
    # row2col = true

    [light]
    capslock = { pin = "P0_31", low_active = true }

    [[input_device.encoder]]
    pin_a = "P0_02"
    pin_b = "P1_15"
    phase = "default"

    [[layer]]
    encoders = [["AudioVolUp", "AudioVolDown"]]

    [[layer]]
    encoders = [["BrightnessUp", "BrightnessDown"]]

    [layout]
    rows = 4
    cols = 10
    layers = 4
    keymap = [
        [
            ["Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P"],
            ["A", "S", "D", "F", "G", "H", "J", "K", "L", "Backspace"],
            ["LShift", "Z", "X", "C", "V", "B", "N", "M", "UP", "Enter"],
            ["LCtrl", "LGui", "LAlt", "TAB", "Delete", "Space", "_", "Left", "Down", "Right"]
        ],
        [
            ["Escape", "Kc7", "Kc8", "Kc9", "_", "_", "_", "_", "_", "_"],
            ["Backspace", "Kc4", "Kc5", "Kc6", "_", "_", "_", "_", "_", "_"],
            ["_", "Kc1", "Kc2", "Kc3", "_", "_", "_", "_", "_", "_"],
            ["LCtrl", "Kc0", "KpDot", "_", "Enter", "CapsLock", "KpDot", "KpComma", "_", "_"],
        ],
        [
            ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
            ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
            ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
            ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ],
        [
            ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
            ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
            ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
            ["_", "_", "_", "_", "_", "_", "_", "_", "_", "_"],
        ],
    ]
